# =============================================================================
# MILITARY PASS — Auto-Deploy to Hugging Face Spaces
# =============================================================================
# Deploys: AI Engine (Gradio ZeroGPU) + Frontend (Docker) to HF Spaces.
# Required secrets: HF_TOKEN. Uses huggingface_hub API (not git) for uploads.
# ==============================================================================
name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: hf-deploy
  cancel-in-progress: false

env:
  HF_AI_SPACE: fashionistar/military-pass-ai
  HF_FRONTEND_SPACE: fashionistar/military-pass-frontend

jobs:
  deploy-ai-engine:
    name: Deploy AI Engine Space
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Upload AI engine files to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          from huggingface_hub import HfApi
          import os
          api = HfApi(token=os.environ['HF_TOKEN'])
          api.upload_folder(
              folder_path='deploy/huggingface-ai-engine',
              repo_id='${HF_AI_SPACE}',
              repo_type='space',
              commit_message='Auto-deploy from GitHub: ${GITHUB_SHA::7}',
          )
          print('AI Engine deployed to ${HF_AI_SPACE}')
          "

  deploy-frontend:
    name: Deploy Frontend Space
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Prepare frontend files
        run: |
          mkdir -p /tmp/frontend-deploy
          rsync -av --delete \
            --exclude='node_modules' --exclude='.next' --exclude='.git' \
            --exclude='.github' --exclude='deploy' --exclude='tests' --exclude='docs' --exclude='coverage' \
            --exclude='.env' --exclude='.env.local' --exclude='.env.*.local' \
            --exclude='*.tsbuildinfo' --exclude='*.log' --exclude='*.backup' --exclude='.DS_Store' \
            --exclude='modal_login.png' --exclude='posthog-setup-report.md' \
            --exclude='nixpacks.toml' --exclude='apphosting.yaml' \
            --exclude='railway.json' --exclude='render.yaml' \
            --exclude='test_db.js' --exclude='test_tables.js' \
            --exclude='UNIFICATION-CHANGELOG.md' --exclude='.env.example' \
            --exclude='skills-lock.json' \
            "${GITHUB_WORKSPACE}/" /tmp/frontend-deploy/
          cp "${GITHUB_WORKSPACE}/deploy/huggingface-frontend/README.md" /tmp/frontend-deploy/README.md

      - name: Upload frontend files to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          from huggingface_hub import HfApi
          import os
          api = HfApi(token=os.environ['HF_TOKEN'])
          api.upload_folder(
              folder_path='/tmp/frontend-deploy',
              repo_id='${HF_FRONTEND_SPACE}',
              repo_type='space',
              commit_message='Auto-deploy from GitHub: ${GITHUB_SHA::7}',
          )
          print('Frontend deployed to ${HF_FRONTEND_SPACE}')
          "

      - name: Output deployment URLs
        run: |
          echo "Frontend: https://fashionistar-military-pass-frontend.hf.space"
          echo "AI Engine: https://fashionistar-military-pass-ai.hf.space"

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: [deploy-ai-engine, deploy-frontend]
    steps:
      - name: Wait for HF Spaces to boot
        run: sleep 60

      - name: Check Frontend Space is live
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://fashionistar-military-pass-frontend.hf.space || echo "000")
          echo "Frontend HTTP Status: $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "302" ]; then
            echo "WARNING: Frontend Space not responding (status: $STATUS)"
          fi

      - name: Check AI Engine Space is live
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://fashionistar-military-pass-ai.hf.space || echo "000")
          echo "AI Engine HTTP Status: $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "302" ]; then
            echo "WARNING: AI Engine Space not responding (status: $STATUS)"
          fi
